version: "3.9"

services:
  db:
    image: postgres:17

    environment:
      POSTGRES_DB: custom_auth_db
      POSTGRES_USER: custom_auth_user
      POSTGRES_PASSWORD: strong_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py seed_rbac &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

volumes:
  postgres_data:
